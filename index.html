<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍞 Levain Lab</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  max-width:600px;
  margin:40px auto;
  padding:20px;
  background:#f7f1e8;
  color:#3b3028;
}

.card{
  background:white;
  padding:24px;
  border-radius:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
}

input{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:12px;
  font-size:16px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.result{
  margin-top:20px;
  padding:16px;
  background:#f1e3d1;
  border-radius:12px;
}

.result p{
  margin:8px 0;
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🍞 Levain Lab</h1>
  <p>르방 스타터 계산기</p>

  <label>총량(g)</label>
  <input id="total" type="number" value="80">

  <label>비율 (스타터 : 밀가루 : 물)</label>

  <div class="row">
    <input id="starterRatio" type="number" value="2">
    <input id="flourRatio" type="number" value="1">
    <input id="waterRatio" type="number" value="1">
  </div>

  <div class="result">
    <p>스타터: <strong id="starterResult">40g</strong></p>
    <p>밀가루: <strong id="flourResult">20g</strong></p>
    <p>물: <strong id="waterResult">20g</strong></p>
  </div>
</div>

<script>

const totalInput = document.getElementById("total");
const starterRatioInput = document.getElementById("starterRatio");
const flourRatioInput = document.getElementById("flourRatio");
const waterRatioInput = document.getElementById("waterRatio");

function calculate(){

  const total = Number(totalInput.value) || 0;

  const starterRatio = Number(starterRatioInput.value) || 0;
  const flourRatio = Number(flourRatioInput.value) || 0;
  const waterRatio = Number(waterRatioInput.value) || 0;

  const sum = starterRatio + flourRatio + waterRatio;

  if(sum <= 0) return;

  document.getElementById("starterResult").textContent =
    (total * starterRatio / sum).toFixed(1) + "g";

  document.getElementById("flourResult").textContent =
    (total * flourRatio / sum).toFixed(1) + "g";

  document.getElementById("waterResult").textContent =
    (total * waterRatio / sum).toFixed(1) + "g";
}

[
 totalInput,
 starterRatioInput,
 flourRatioInput,
 waterRatioInput
].forEach(el => el.addEventListener("input", calculate));

calculate();

</script>

</body>
</html>
